<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FxxKStock 工作台原型</title>
  <link rel="icon" type="image/png" sizes="64x64" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./fxxkstock-icon.png" />
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0d10;
      --shell: #0f1418;
      --shell-2: #141a20;
      --panel: #171e24;
      --panel-2: #1c252c;
      --panel-3: #222c34;
      --line: #2d3943;
      --line-soft: #202a32;
      --text: #edf3f6;
      --text-soft: #c8d4da;
      --muted: #8b9aa4;
      --faint: #65747d;
      --accent: #3ba58a;
      --accent-soft: rgba(59, 165, 138, .16);
      --blue: #5187d7;
      --blue-soft: rgba(81, 135, 215, .16);
      --amber: #d6a642;
      --amber-soft: rgba(214, 166, 66, .16);
      --red: #e76f61;
      --red-soft: rgba(231, 111, 97, .14);
      --green: #6abd79;
      --green-soft: rgba(106, 189, 121, .14);
      --violet: #9a82d6;
      --shadow: 0 18px 50px rgba(0, 0, 0, .28);
      --sidebar: 304px;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "SF Pro Text", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    .icon {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .prototype {
      width: 100%;
      height: 100dvh;
      min-height: 0;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      background:
        radial-gradient(circle at 72% 12%, rgba(59, 165, 138, .09), transparent 32%),
        linear-gradient(180deg, #0d1115 0%, #080b0e 100%);
    }

    .sidebar {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: rgba(13, 18, 22, .96);
    }

    .brand {
      height: 60px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 17px;
      font-weight: 760;
    }

    .brand img {
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }

    .brand small {
      margin-left: auto;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }

    .mobile-menu {
      display: none;
      width: 34px;
      height: 34px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
    }

    .side-tools {
      flex: 0 0 auto;
      padding: 12px;
      border-bottom: 1px solid var(--line-soft);
    }

    .primary-btn,
    .ghost-btn,
    .icon-btn {
      height: 36px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .primary-btn {
      padding: 0 14px;
      background: var(--accent);
      color: #06100d;
      font-weight: 760;
    }

    .ghost-btn {
      padding: 0 12px;
      background: var(--panel);
      border-color: var(--line);
      color: var(--text-soft);
    }

    .icon-btn {
      width: 36px;
      padding: 0;
      background: var(--panel);
      border-color: var(--line);
      color: var(--muted);
    }

    .search {
      position: relative;
      margin-top: 10px;
    }

    .search .icon {
      position: absolute;
      left: 10px;
      top: 10px;
      color: var(--faint);
    }

    .search input {
      width: 100%;
      height: 36px;
      padding: 0 10px 0 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      outline: 0;
      background: #10161b;
    }

    .search input:focus {
      border-color: rgba(59, 165, 138, .8);
    }

    .side-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .side-section-title span:last-child {
      color: var(--faint);
      font-weight: 650;
      text-transform: none;
    }

    .watchlist {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 8px 14px;
    }

    .watch-item {
      width: 100%;
      min-height: 82px;
      margin-bottom: 6px;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      text-align: left;
    }

    .watch-item:hover {
      background: rgba(255, 255, 255, .035);
    }

    .watch-item.active {
      border-color: rgba(59, 165, 138, .42);
      background: var(--accent-soft);
    }

    .watch-top,
    .watch-meta,
    .watch-foot {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .watch-top strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
    }

    .watch-top span {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .watch-meta {
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
    }

    .watch-foot {
      justify-content: space-between;
      margin-top: 8px;
      color: var(--faint);
      font-size: 11px;
    }

    .run-track {
      height: 5px;
      flex: 1;
      overflow: hidden;
      border-radius: 999px;
      background: #2b363d;
    }

    .run-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      min-height: 19px;
      padding: 2px 7px;
      border: 1px solid currentColor;
      border-radius: 999px;
      overflow: hidden;
      font-size: 10px;
      font-weight: 780;
      line-height: 1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge.green { color: var(--green); background: var(--green-soft); }
    .badge.red { color: var(--red); background: var(--red-soft); }
    .badge.amber { color: var(--amber); background: var(--amber-soft); }
    .badge.blue { color: var(--blue); background: var(--blue-soft); }
    .badge.violet { color: var(--violet); background: rgba(154, 130, 214, .14); }
    .badge.neutral { color: var(--muted); background: rgba(139, 154, 164, .1); }

    .main {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 68px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(13, 18, 22, .9);
      backdrop-filter: blur(12px);
    }

    .title-block {
      min-width: 0;
      margin-right: auto;
    }

    .title-block h1 {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 21px;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title-block p {
      margin: 6px 0 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .theme-note {
      height: 26px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, .025);
      font-size: 11px;
      white-space: nowrap;
    }

    .content {
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
    }

    .decision-grid {
      display: grid;
      grid-template-columns: minmax(280px, 1.1fr) minmax(260px, .85fr) minmax(260px, .85fr);
      gap: 12px;
      align-items: stretch;
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(23, 30, 36, .92);
      box-shadow: var(--shadow);
    }

    .decision-hero {
      padding: 18px;
      border-color: rgba(59, 165, 138, .34);
      background:
        linear-gradient(135deg, rgba(59, 165, 138, .15), transparent 38%),
        rgba(23, 30, 36, .96);
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .panel-title > * {
      min-width: 0;
    }

    .panel-title > span:last-child {
      max-width: 58%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .decision-rating {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      min-width: 0;
    }

    .decision-rating strong {
      color: var(--text);
      font-size: clamp(30px, 4vw, 46px);
      line-height: .94;
      letter-spacing: 0;
    }

    .decision-rating span {
      margin-bottom: 5px;
      color: var(--text-soft);
      font-size: 16px;
      font-weight: 720;
    }

    .decision-copy {
      margin: 14px 0 16px;
      max-width: 70ch;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.65;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      gap: 8px;
    }

    .metric {
      min-height: 64px;
      padding: 9px;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: rgba(255, 255, 255, .025);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .metric strong {
      display: block;
      margin-top: 7px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .change-panel,
    .action-panel,
    .market-panel,
    .progress-panel {
      padding: 15px;
    }

    .change-list,
    .action-list,
    .risk-list,
    .event-list {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .change-list li,
    .action-list li,
    .risk-list li,
    .event-list li {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      color: var(--text-soft);
      line-height: 1.45;
    }

    .dot {
      width: 8px;
      height: 8px;
      margin-top: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .dot.amber { background: var(--amber); }
    .dot.red { background: var(--red); }
    .dot.blue { background: var(--blue); }

    .market-progress-grid {
      display: grid;
      grid-template-columns: minmax(320px, .9fr) minmax(420px, 1.1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .market-summary {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .price-box {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: rgba(255, 255, 255, .025);
    }

    .price-box span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .price-box strong {
      display: block;
      margin-top: 10px;
      font-size: 28px;
      line-height: 1;
    }

    .price-box em {
      display: block;
      margin-top: 8px;
      color: var(--green);
      font-style: normal;
      font-weight: 720;
    }

    .chart-wrap {
      min-width: 0;
      height: 138px;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: #11181d;
      padding: 8px;
    }

    .chart-wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .quote-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .quote-cell {
      min-height: 52px;
      padding: 8px;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: rgba(255, 255, 255, .025);
    }

    .quote-cell span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .quote-cell strong {
      display: block;
      margin-top: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stage-line {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 13px;
    }

    .stage {
      min-height: 76px;
      padding: 10px;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: rgba(255, 255, 255, .025);
    }

    .stage.done {
      border-color: rgba(106, 189, 121, .34);
      background: var(--green-soft);
    }

    .stage.active {
      border-color: rgba(81, 135, 215, .5);
      background: var(--blue-soft);
    }

    .stage span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .stage strong {
      display: block;
      margin-top: 8px;
      overflow: hidden;
      color: var(--text-soft);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .progress-bar {
      height: 7px;
      flex: 1;
      overflow: hidden;
      border-radius: 999px;
      background: #2b363d;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }

    .reader-shell {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .reader-nav {
      min-width: 0;
      padding: 10px;
      align-self: start;
      position: sticky;
      top: 0;
    }

    .reader-nav h2,
    .reader-body h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    .section-btn {
      width: 100%;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      padding: 0 10px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--text-soft);
      text-align: left;
    }

    .section-btn:hover {
      background: rgba(255, 255, 255, .035);
    }

    .section-btn.active {
      border-color: rgba(59, 165, 138, .42);
      background: var(--accent-soft);
      color: var(--text);
    }

    .section-btn span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .reader-body {
      min-width: 0;
      overflow-x: auto;
      padding: 18px;
    }

    .reader-kicker {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .reader-body h3 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.25;
    }

    .reader-body p {
      margin: 0 0 12px;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.75;
    }

    .reader-body table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 7px;
    }

    .reader-body th,
    .reader-body td {
      padding: 10px;
      border-bottom: 1px solid var(--line-soft);
      text-align: left;
      vertical-align: top;
    }

    .reader-body th {
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
      background: rgba(255, 255, 255, .025);
    }

    .reader-body tr:last-child td {
      border-bottom: 0;
    }

    .mobile-backdrop {
      display: none;
    }

    @media (max-width: 1160px) {
      .decision-grid {
        grid-template-columns: minmax(0, 1fr) minmax(260px, .78fr);
      }

      .action-panel {
        grid-column: 1 / -1;
      }

      .market-progress-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
        overflow-x: hidden;
      }

      .prototype {
        min-height: 100dvh;
        height: auto;
        display: block;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 20;
        width: min(86vw, 318px);
        transform: translateX(-102%);
        transition: transform .22s ease;
        box-shadow: var(--shadow);
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      body.sidebar-open .mobile-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 19;
        background: rgba(0, 0, 0, .55);
      }

      .brand small {
        display: none;
      }

      .main {
        min-height: 100dvh;
      }

      .mobile-menu {
        display: inline-flex;
      }

      .topbar {
        height: auto;
        min-height: 64px;
        flex-wrap: wrap;
        padding: 10px 12px;
      }

      .title-block {
        order: 2;
        width: calc(100% - 48px);
      }

      .topbar > .ghost-btn,
      .topbar > .primary-btn,
      .theme-note {
        display: none;
      }

      .content {
        padding: 12px;
        overflow-x: hidden;
      }

      .decision-grid,
      .market-progress-grid,
      .reader-shell,
      .market-summary {
        grid-template-columns: 1fr;
      }

      .decision-grid > *,
      .market-progress-grid > *,
      .reader-shell > * {
        min-width: 0;
      }

      .panel-title > span:last-child {
        max-width: 48%;
      }

      .metric-row,
      .quote-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stage-line {
        grid-template-columns: 1fr;
      }

      .reader-nav {
        position: static;
        display: flex;
        gap: 6px;
        overflow-x: auto;
      }

      .reader-nav h2 {
        display: none;
      }

      .section-btn {
        width: auto;
        min-width: 120px;
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <div class="prototype">
    <aside class="sidebar" aria-label="研究标的池">
      <div class="brand">
        <img src="./fxxkstock-icon.png" alt="" />
        <span>FxxKStock</span>
        <small>Workbench Prototype</small>
      </div>

      <div class="side-tools">
        <button class="primary-btn" type="button"><i data-lucide="plus" class="icon"></i>新建分析</button>
        <div class="search">
          <i data-lucide="search" class="icon"></i>
          <input type="search" value="" placeholder="搜索自选标的" aria-label="搜索自选标的" />
        </div>
      </div>

      <div class="side-section-title"><span>今日研究池</span><span>浏览器本地</span></div>
      <div class="watchlist" id="watchlist"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="mobile-menu" id="mobileMenu" type="button" aria-label="打开研究池"><i data-lucide="menu" class="icon"></i></button>
        <div class="title-block">
          <h1 id="instrumentTitle">-</h1>
          <p id="instrumentMeta">-</p>
        </div>
        <span class="theme-note"><i data-lucide="palette" class="icon"></i>暗色成品，浅色变量预留</span>
        <button class="ghost-btn" type="button"><i data-lucide="history" class="icon"></i>历史版本</button>
        <button class="primary-btn" type="button"><i data-lucide="refresh-cw" class="icon"></i>重新分析</button>
        <button class="icon-btn" type="button" aria-label="设置"><i data-lucide="settings" class="icon"></i></button>
      </header>

      <div class="content">
        <section class="decision-grid" aria-label="第一屏决策区">
          <article class="panel decision-hero">
            <div class="panel-title">
              <span>今日结论</span>
              <span class="badge" id="decisionBadge">-</span>
            </div>
            <div class="decision-rating">
              <strong id="decisionRating">-</strong>
              <span id="decisionLabel">-</span>
            </div>
            <p class="decision-copy" id="decisionCopy">-</p>
            <div class="metric-row">
              <div class="metric"><span>目标价</span><strong id="targetPrice">-</strong></div>

    function drawSparkline(values, color) {
      const canvas = $("sparkline");
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      const min = Math.min(...values);
      const max = Math.max(...values);
      const spread = Math.max(.01, max - min);
      const x = (index) => 8 + index * ((width - 16) / Math.max(1, values.length - 1));
      const y = (value) => height - 12 - ((value - min) / spread) * (height - 24);

      ctx.strokeStyle = "rgba(255,255,255,.08)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i += 1) {
        const gy = 14 + i * ((height - 28) / 3);
        ctx.beginPath();
        ctx.moveTo(8, gy);
        ctx.lineTo(width - 8, gy);
        ctx.stroke();
      }

      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, `${color}55`);
      gradient.addColorStop(1, `${color}00`);

      ctx.beginPath();
      values.forEach((value, index) => {
        const px = x(index);
        const py = y(value);
        if (index === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.lineTo(x(values.length - 1), height - 10);
      ctx.lineTo(x(0), height - 10);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.beginPath();
      values.forEach((value, index) => {
        const px = x(index);
        const py = y(value);
        if (index === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.stroke();
    }

      `;
    }

    function render() {
      const stock = stocks[selectedIndex];
